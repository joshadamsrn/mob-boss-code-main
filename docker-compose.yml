version: "3.9"

services:
  web:
    build: .
    command: python project/mobboss_apps/manage.py runserver 0.0.0.0:8000
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DJANGO_SETTINGS_MODULE=mobboss.settings
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mobboss
      - POSTGRES_USER=mobboss
      - POSTGRES_PASSWORD=mobboss

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      - POSTGRES_DB=mobboss
      - POSTGRES_USER=mobboss
      - POSTGRES_PASSWORD=mobboss
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
