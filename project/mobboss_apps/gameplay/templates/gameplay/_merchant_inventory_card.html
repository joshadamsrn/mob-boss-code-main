{% if is_current_user_merchant and page.status == "in_progress" %}
    <div id="merchantInventoryCard" class="card hero-card mb-3">
        <div class="card-body p-3 p-md-4">
            <h2 class="h6 mb-3">Money and Central Supply</h2>
            <div class="row g-2 mb-3 merchant-balance-row">
                <div class="col-6 merchant-balance-block">
                    <div class="small text-secondary mb-1">Money Balance</div>
                    <div class="fw-semibold money-balance-value">${{ merchant_money_balance }}</div>
                </div>
                <div class="col-6 text-end merchant-balance-block">
                    <div class="small text-secondary mb-1">Money Goal</div>
                    <div class="fw-semibold">${{ merchant_money_goal }}</div>
                </div>
            </div>
            {% if player_gift_targets %}
                <form method="post" action="/games/{{ page.game_id }}/give-money" class="mb-3">
                    {% csrf_token %}
                    <input type="hidden" name="as_user_id" value="{{ current_user_id }}">
                    <input type="hidden" name="simulate_actions" value="{% if simulate_actions_enabled %}1{% else %}0{% endif %}">
                    <input type="hidden" name="expected_version" value="{{ page.version }}">
                    <div class="small text-secondary mb-1">Gift Money</div>
                    <div class="mobile-form-row">
                        <select class="form-select form-select-sm" name="receiver_user_id" required>
                            <option value="">Choose player...</option>
                            {% for target in player_gift_targets %}
                                <option value="{{ target.user_id }}">{{ target.username }}</option>
                            {% endfor %}
                        </select>
                        <input class="form-control form-control-sm" type="number" min="1" step="1" name="amount" placeholder="Amount" required>
                        <button class="btn btn-outline-success btn-sm" type="submit">Send</button>
                    </div>
                </form>
            {% endif %}

            <form method="post" action="/games/{{ page.game_id }}/buy-from-supply" class="mb-3">
                {% csrf_token %}
                <input type="hidden" name="as_user_id" value="{{ current_user_id }}">
                <input type="hidden" name="simulate_actions" value="{% if simulate_actions_enabled %}1{% else %}0{% endif %}">
                <input type="hidden" name="expected_version" value="{{ page.version }}">
                <label for="merchantSupplyClassification">Buy From Central Supply</label>
                <div class="mobile-form-row mt-1">
                    <select id="merchantSupplyClassification" class="form-select form-select-sm" name="classification" required>
                        <option value="">Choose item</option>
                        {% for item in merchant_supply_items %}
                            <option value="{{ item.classification }}">
                                {{ item.display_name }} (Base: ${{ item.base_price }})
                            </option>
                        {% endfor %}
                    </select>
                    <button class="btn btn-primary btn-sm" type="submit">Buy</button>
                </div>
            </form>
        </div>
    </div>
{% endif %}
