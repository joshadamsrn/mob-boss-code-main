<div class="card hero-card mb-3">
    <div class="card-body p-3 p-md-4">
        <h2 class="h6 mb-3">Moderator Controls</h2>
        <form id="reportDeathForm" method="post" action="/games/{{ page.game_id }}/report-death" class="room-compact-form">
            {% csrf_token %}
            <input type="hidden" name="as_user_id" value="{{ current_user_id }}">
            <input type="hidden" name="simulate_actions" value="{% if simulate_actions_enabled %}1{% else %}0{% endif %}">
            <label for="murderedUserId">Eliminated Player</label>
            <select id="murderedUserId" class="form-select form-select-sm" name="murdered_user_id" required>
                <option value="">Choose player</option>
                {% for participant in page.participant_rows %}
                    {% if participant.life_state == "alive" %}
                        <option value="{{ participant.user_id }}">{{ participant.username }}</option>
                    {% endif %}
                {% endfor %}
            </select>
            <label for="moderatorMurdererId" class="mt-3">Attacker (optional)</label>
            <select id="moderatorMurdererId" class="form-select form-select-sm" name="murderer_user_id">
                <option value="">Unknown / skip for now</option>
                {% for participant in page.participant_rows %}
                    {% if participant.life_state == "alive" %}
                        <option value="{{ participant.user_id }}">{{ participant.username }}</option>
                    {% endif %}
                {% endfor %}
            </select>
            <label for="moderatorAttackClassification" class="mt-3">Weapon Used</label>
            <select id="moderatorAttackClassification" class="form-select form-select-sm" name="attack_classification" required>
                <option value="" selected disabled>Select weapon</option>
                <option value="knife">Knife</option>
                <option value="gun_tier_1">Gun</option>
            </select>
            <input id="expectedVersionInput" type="hidden" name="expected_version" value="{{ page.version }}">
            <div class="small text-secondary mt-2">Sync check version: <span id="expectedVersionLabel">{{ page.version }}</span>.</div>
            <button id="reportDeathButton" class="btn btn-outline-danger btn-sm mt-3 w-100 w-sm-auto" type="submit">Confirm Elimination</button>
        </form>
    </div>
</div>
