{% extends "web/base.html" %}

{% block title %}Game Info{% endblock %}

{% block content %}
<section class="container py-3 py-md-4">
    <div class="card hero-card mb-3">
        <div class="card-body p-3 p-md-4">
            <h1 class="h4 mb-2">Game Info</h1>
            <div class="small text-secondary">Room ID: {{ page.room_id }}</div>
            <div class="small text-secondary">Game ID: {{ page.game_id }}</div>
            <div class="d-flex flex-wrap gap-2 mt-3">
                <span class="badge text-bg-light border">Phase: {{ page.phase }}</span>
                <span class="badge text-bg-light border">Status: {{ page.status }}</span>
                <span class="badge text-bg-light border">Round: {{ page.round_number }}</span>
            </div>
            <div class="mt-3">
                <a href="/games/{{ page.game_id }}/" class="btn btn-outline-dark btn-sm">Back To Game</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
