<div id="viewerNotificationsCard" class="card hero-card mb-3{% if not viewer_notifications %} d-none{% endif %}">
    <div class="card-body p-3 p-md-4">
        <h2 class="h6 mb-3">Private Notices</h2>
        <div id="viewerNotificationsList" class="d-flex flex-column gap-2">
            {% for event in viewer_notifications %}
                <div class="room-member-tile">
                    <div class="small">{{ event.message }}</div>
                </div>
            {% endfor %}
        </div>
    </div>
</div>
