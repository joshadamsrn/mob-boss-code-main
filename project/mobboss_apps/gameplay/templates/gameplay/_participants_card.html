<div class="card hero-card mb-3">
    <div class="card-body p-3 p-md-4">
        <h2 class="h6 mb-3">Participants ({{ participant_rows|length }})</h2>
        <div id="gameParticipantsList">
            {% for participant in participant_rows %}
                <div class="room-member-tile mb-2">
                    <div class="d-flex justify-content-between align-items-start gap-2">
                        <div class="fw-semibold">
                            {{ participant.username }}
                            {% if participant.is_self %}<span class="text-secondary small">(You)</span>{% endif %}
                        </div>
                        <span class="badge {% if participant.life_state == 'alive' %}text-bg-success{% elif participant.life_state == 'jailed' %}text-bg-warning{% else %}text-bg-secondary{% endif %}">
                            {{ participant.life_state|title }}
                        </span>
                    </div>
                    <div class="small text-secondary mt-1">{{ participant.role_label }}</div>
                </div>
            {% empty %}
                <div class="text-secondary">No participants found.</div>
            {% endfor %}
        </div>
    </div>
</div>
