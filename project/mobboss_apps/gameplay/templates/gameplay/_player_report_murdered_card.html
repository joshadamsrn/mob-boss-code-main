<div class="card hero-card mb-3">
    <div class="card-body p-3 p-md-4">
        <h2 class="h6 mb-2">Report Murder</h2>
        <div class="small text-secondary mb-3">If you were killed, identify the attacker and the weapon used.</div>
        <form method="post" action="/games/{{ page.game_id }}/report-death" class="room-compact-form">
            {% csrf_token %}
            <input type="hidden" name="as_user_id" value="{{ current_user_id }}">
            <input type="hidden" name="simulate_actions" value="{% if simulate_actions_enabled %}1{% else %}0{% endif %}">
            <input type="hidden" name="murdered_user_id" value="{{ current_user_id }}">
            <input type="hidden" name="expected_version" value="{{ page.version }}">
            <label for="selfReportMurdererId">Attacker</label>
            <select id="selfReportMurdererId" class="form-select form-select-sm" name="murderer_user_id" required>
                <option value="">Select living player</option>
                {% for participant in self_report_murderer_rows %}
                    <option value="{{ participant.user_id }}">{{ participant.username }}</option>
                {% endfor %}
            </select>
            <label for="selfReportAttackClassification" class="mt-3">Weapon</label>
            <select id="selfReportAttackClassification" class="form-select form-select-sm" name="attack_classification" required>
                <option value="" selected disabled>Select weapon</option>
                <option value="knife">Knife</option>
                <option value="gun_tier_1">Handgun (Tier 1)</option>
                <option value="gun_tier_2">Pistol (Tier 2)</option>
                <option value="gun_tier_3">Revolver (Tier 3)</option>
            </select>
            <button class="btn btn-outline-danger btn-sm mt-3 w-100 w-sm-auto" type="submit">Submit Death Report</button>
        </form>
    </div>
</div>
