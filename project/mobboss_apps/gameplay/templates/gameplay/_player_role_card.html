{% if use_player_phone_layout %}
    <div class="card hero-card mb-3 role-title-card">
        <div class="card-body p-3 p-md-4 text-center">
            <div class="small text-uppercase text-secondary mb-1">Character Role</div>
            <div class="display-6 fw-semibold lh-1">{{ player_role_name }}</div>
            <div class="small text-secondary mt-2">{{ player_role_label }}</div>
            {% if player_role_image_url %}
                <div class="role-title-art mt-3">
                    <img
                        src="{{ player_role_image_url }}"
                        alt="{{ player_role_name }} portrait"
                        class="rounded border role-title-image"
                        width="132"
                        style="display:block;width:132px;max-width:100%;height:auto;object-fit:contain;margin:0 auto;"
                    >
                </div>
            {% endif %}
        </div>
    </div>
{% endif %}
